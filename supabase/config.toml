# Familiar's Call — Supabase local config (optional; used by Supabase CLI)

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1"
additional_redirect_urls = []
enable_anonymous_sign_ins = true

[functions.daily]
verify_jwt = true
