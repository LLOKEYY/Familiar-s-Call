# Render Blueprint — optional alternative to Fly.io
# Dashboard: New > Blueprint > connect repo with render.yaml at repo root path server/render.yaml
services:
  - type: web
    name: familiarscall-daily
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: FC_DATA_DIR
        value: /app/data
      - key: FC_DB_PATH
        value: /data/familiarscall.db
      - key: PORT
        value: "8080"
    disk:
      name: fc-daily-data
      mountPath: /data
      sizeGB: 1
